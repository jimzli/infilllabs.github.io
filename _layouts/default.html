---
layout: compress
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){var t=localStorage.getItem('theme');if(t){document.documentElement.setAttribute('data-theme',t);}})();</script>
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="theme-color" content="#00008b" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b0f1a" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <main class="container">
        {{ content }}
    </main>
    <footer class="site-footer">&copy; <span id="year">{{ site.time | date: '%Y' }}</span> infill labs. All rights reserved.</footer>
    <script>
    (function(){
        var root = document.documentElement;
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function effective(){ var t = root.getAttribute('data-theme'); return t ? t : (mq.matches ? 'dark' : 'light'); }
        function sync(){ root.classList.toggle('is-dark', effective() === 'dark'); }
        sync();
        var btn = document.querySelector('.theme-toggle');
        btn.addEventListener('click', function(){
            var next = effective() === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            sync();
        });
        mq.addEventListener('change', sync);
        document.getElementById('year').textContent = new Date().getFullYear();
    })();
    </script>
</body>
</html>
